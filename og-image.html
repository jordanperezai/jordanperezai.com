<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0c0c0c;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px;
    position: relative;
    overflow: hidden;
  }
  .glow {
    position: absolute;
    top: 50%;
    right: 15%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(232,200,114,0.1) 0%, transparent 70%);
    transform: translate(50%, -50%);
  }
  .name {
    font-size: 22px;
    font-weight: 500;
    color: #e8c872;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  .headline {
    font-size: 64px;
    font-weight: 700;
    color: #ebebeb;
    line-height: 1.1;
    letter-spacing: -2px;
    max-width: 800px;
  }
  .headline span {
    color: #e8c872;
  }
  .sub {
    font-size: 24px;
    color: #a0a0a0;
    margin-top: 32px;
    line-height: 1.5;
  }
  .bottom {
    position: absolute;
    bottom: 72px;
    right: 80px;
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .tag {
    background: rgba(232,200,114,0.1);
    border: 1px solid rgba(232,200,114,0.25);
    border-radius: 6px;
    padding: 10px 20px;
    color: #e8c872;
    font-size: 16px;
    font-weight: 500;
  }
  .url {
    color: #666;
    font-size: 16px;
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="name">Jordan Perez</div>
  <div class="headline">I build AI systems<br>that <span>run businesses.</span></div>
  <div class="sub">Founder of arugami. Consulting. Speaking. Building.</div>
  <div class="bottom">
    <span class="tag">jordanperezai.com</span>
  </div>
</body>
</html>
