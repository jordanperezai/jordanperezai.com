<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book a Call — Jordan Perez</title>
  <meta name="description" content="Book a 30-minute intro call with Jordan Perez. Quick call to talk about how AI can work for your business.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0c0c0c;
      --border: #252525;
      --text: #ebebeb;
      --text-dim: #666;
      --accent: #e8c872;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    h1, .nav-name {
      font-family: 'Space Grotesk', sans-serif;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    nav {
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }

    nav .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-name {
      font-weight: 600;
      font-size: 16px;
      color: var(--text);
      text-decoration: none;
    }

    .nav-back {
      font-size: 14px;
      color: var(--text-dim);
    }

    .booking-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 28px;
    }

    .booking-container h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .booking-container p {
      color: var(--text-dim);
      font-size: 15px;
      margin-bottom: 32px;
    }

    .booking-container iframe {
      width: 100%;
      min-height: 700px;
      border: none;
      overflow: hidden;
      border-radius: 12px;
    }
  </style>
</head>
<body>

  <nav>
    <div class="container">
      <a href="/" class="nav-name">Jordan Perez</a>
      <a href="/" class="nav-back">&larr; Back to site</a>
    </div>
  </nav>

  <div class="booking-container">
    <h1>Book a call</h1>
    <p>30 minutes. Quick call to talk about how AI can work for your business.</p>
    <iframe src="https://api.leadconnectorhq.com/widget/booking/0ftDyqM74xw1NKTnxnOJ" scrolling="no" id="ghl-booking"></iframe>
  </div>

  <script src="https://link.msgsndr.com/js/form_embed.js" type="text/javascript"></script>

</body>
</html>
